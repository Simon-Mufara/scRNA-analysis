<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0B1E3F"/>
      <stop offset="100%" stop-color="#040D1C"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A6FA8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1A6FA8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2DA86B" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2DA86B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cellGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0D2240"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur12">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <!-- Ambient glows -->
  <ellipse cx="180" cy="200" rx="180" ry="160" fill="url(#glow1)" filter="url(#blur12)"/>
  <ellipse cx="430" cy="180" rx="150" ry="120" fill="url(#glow2)" filter="url(#blur12)"/>

  <!-- Fine grid overlay -->
  <g stroke="#1A3A5C" stroke-width="0.3" opacity="0.4">
    <line x1="0" y1="50"  x2="600" y2="50"/>
    <line x1="0" y1="100" x2="600" y2="100"/>
    <line x1="0" y1="150" x2="600" y2="150"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="250" x2="600" y2="250"/>
    <line x1="0" y1="300" x2="600" y2="300"/>
    <line x1="0" y1="350" x2="600" y2="350"/>
    <line x1="75"  y1="0" x2="75"  y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="225" y1="0" x2="225" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="375" y1="0" x2="375" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="525" y1="0" x2="525" y2="400"/>
  </g>

  <!-- ===== MAIN CELL ===== -->
  <!-- Cell membrane outer glow -->
  <ellipse cx="200" cy="210" rx="118" ry="108" fill="#1A6FA8" opacity="0.12" filter="url(#blur4)"/>
  <!-- Cell body -->
  <ellipse cx="200" cy="210" rx="108" ry="98" fill="url(#cellGrad)" stroke="#2A7FC0" stroke-width="1.5"/>
  <!-- Cell membrane texture rings -->
  <ellipse cx="200" cy="210" rx="108" ry="98" fill="none" stroke="#3A9FE0" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="200" cy="210" rx="96"  ry="86" fill="none" stroke="#3A9FE0" stroke-width="0.4" opacity="0.2"/>
  <!-- Cytoplasm dots -->
  <circle cx="160" cy="170" r="2" fill="#3A9FE0" opacity="0.5"/>
  <circle cx="240" cy="180" r="1.5" fill="#3A9FE0" opacity="0.4"/>
  <circle cx="170" cy="250" r="2" fill="#3A9FE0" opacity="0.4"/>
  <circle cx="230" cy="240" r="1.5" fill="#3A9FE0" opacity="0.5"/>
  <circle cx="145" cy="220" r="1.5" fill="#3A9FE0" opacity="0.3"/>
  <circle cx="260" cy="220" r="1.5" fill="#3A9FE0" opacity="0.3"/>
  <!-- Mitochondria -->
  <ellipse cx="158" cy="245" rx="10" ry="5" fill="none" stroke="#2DA86B" stroke-width="1.2" opacity="0.7"/>
  <ellipse cx="242" cy="165" rx="8"  ry="4" fill="none" stroke="#2DA86B" stroke-width="1"   opacity="0.6"/>
  <!-- Nucleus glow -->
  <ellipse cx="200" cy="210" rx="46" ry="42" fill="#1A6FA8" opacity="0.2" filter="url(#blur4)"/>
  <!-- Nucleus -->
  <ellipse cx="200" cy="210" rx="42" ry="38" fill="#0D2A4A" stroke="#3AAFE0" stroke-width="1.5"/>
  <!-- Chromatin threads -->
  <path d="M182 196 C192 188 208 192 218 200 C228 208 222 222 212 226 C202 230 188 226 182 218 C176 210 180 204 182 196z" stroke="#5AC8FA" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M190 202 C198 196 210 200 214 210 C218 220 208 228 200 226 C192 224 186 216 190 202z" stroke="#5AC8FA" stroke-width="0.6" fill="none" opacity="0.4"/>
  <!-- DNA double helix hint in nucleus -->
  <path d="M190 208 Q195 204 200 208 Q205 212 210 208" stroke="#7DD3FC" stroke-width="0.8" fill="none" opacity="0.8"/>
  <path d="M190 213 Q195 217 200 213 Q205 209 210 213" stroke="#7DD3FC" stroke-width="0.8" fill="none" opacity="0.8"/>
  <line x1="190" y1="208" x2="190" y2="213" stroke="#7DD3FC" stroke-width="0.5" opacity="0.6"/>
  <line x1="195" y1="204" x2="195" y2="217" stroke="#7DD3FC" stroke-width="0.5" opacity="0.6"/>
  <line x1="200" y1="208" x2="200" y2="213" stroke="#7DD3FC" stroke-width="0.5" opacity="0.6"/>
  <line x1="205" y1="212" x2="205" y2="209" stroke="#7DD3FC" stroke-width="0.5" opacity="0.6"/>
  <line x1="210" y1="208" x2="210" y2="213" stroke="#7DD3FC" stroke-width="0.5" opacity="0.6"/>

  <!-- ===== SCATTER PLOT (UMAP) right side ===== -->
  <!-- Axis -->
  <line x1="360" y1="340" x2="560" y2="340" stroke="#2A4A6A" stroke-width="1" stroke-linecap="round"/>
  <line x1="360" y1="340" x2="360" y2="100" stroke="#2A4A6A" stroke-width="1" stroke-linecap="round"/>
  <text x="458" y="358" font-size="9" fill="#4A7FA8" font-family="monospace" text-anchor="middle">UMAP 1</text>
  <text x="348" y="225" font-size="9" fill="#4A7FA8" font-family="monospace" text-anchor="middle" transform="rotate(-90 348 225)">UMAP 2</text>

  <!-- Cluster 1: blue — T cells -->
  <circle cx="410" cy="160" r="5"   fill="#2196F3" opacity="0.9"/>
  <circle cx="424" cy="148" r="4.5" fill="#2196F3" opacity="0.8"/>
  <circle cx="398" cy="172" r="4"   fill="#2196F3" opacity="0.85"/>
  <circle cx="418" cy="174" r="3.5" fill="#2196F3" opacity="0.75"/>
  <circle cx="432" cy="162" r="3"   fill="#2196F3" opacity="0.7"/>
  <circle cx="406" cy="142" r="3.5" fill="#2196F3" opacity="0.8"/>

  <!-- Cluster 2: coral — B cells -->
  <circle cx="478" cy="180" r="5"   fill="#E06B2D" opacity="0.9"/>
  <circle cx="492" cy="168" r="4.5" fill="#E06B2D" opacity="0.85"/>
  <circle cx="466" cy="190" r="4"   fill="#E06B2D" opacity="0.8"/>
  <circle cx="484" cy="196" r="3.5" fill="#E06B2D" opacity="0.75"/>
  <circle cx="500" cy="182" r="3.5" fill="#E06B2D" opacity="0.7"/>

  <!-- Cluster 3: green — NK cells -->
  <circle cx="430" cy="264" r="5"   fill="#2DA86B" opacity="0.9"/>
  <circle cx="444" cy="252" r="4.5" fill="#2DA86B" opacity="0.85"/>
  <circle cx="418" cy="276" r="4"   fill="#2DA86B" opacity="0.8"/>
  <circle cx="448" cy="270" r="3.5" fill="#2DA86B" opacity="0.75"/>
  <circle cx="432" cy="280" r="3"   fill="#2DA86B" opacity="0.7"/>

  <!-- Cluster 4: purple — Monocytes -->
  <circle cx="510" cy="272" r="5"   fill="#9B59B6" opacity="0.9"/>
  <circle cx="522" cy="260" r="4"   fill="#9B59B6" opacity="0.85"/>
  <circle cx="498" cy="284" r="4"   fill="#9B59B6" opacity="0.8"/>
  <circle cx="524" cy="280" r="3.5" fill="#9B59B6" opacity="0.75"/>

  <!-- Cluster 5: amber — Dendritic -->
  <circle cx="390" cy="290" r="4.5" fill="#E8A020" opacity="0.9"/>
  <circle cx="374" cy="302" r="4"   fill="#E8A020" opacity="0.8"/>
  <circle cx="400" cy="308" r="3.5" fill="#E8A020" opacity="0.75"/>

  <!-- Cluster labels -->
  <text x="428" y="140" font-size="8" fill="#7BB8F5" font-family="monospace">T cells</text>
  <text x="492" y="166" font-size="8" fill="#F0A070" font-family="monospace">B cells</text>
  <text x="448" y="248" font-size="8" fill="#5DC88A" font-family="monospace">NK</text>
  <text x="526" y="258" font-size="8" fill="#C580E0" font-family="monospace">Mono</text>
  <text x="404" y="320" font-size="8" fill="#F0C060" font-family="monospace">DC</text>

  <!-- ===== CONNECTING LINES cell → scatter ===== -->
  <path d="M308 200 C330 200 340 180 360 180" stroke="#2A7FC0" stroke-width="0.8" stroke-dasharray="4 3" opacity="0.4" fill="none"/>

  <!-- ===== GENE EXPRESSION BAR (bottom left) ===== -->
  <rect x="30" y="330" width="120" height="40" rx="4" fill="#0D1E35" stroke="#1A3A5C" stroke-width="0.8"/>
  <text x="38" y="343" font-size="7" fill="#4A8FBE" font-family="monospace">Gene expression</text>
  <!-- mini bars -->
  <rect x="38"  y="348" width="6" height="16" rx="1" fill="#2196F3" opacity="0.8"/>
  <rect x="48"  y="352" width="6" height="12" rx="1" fill="#2196F3" opacity="0.6"/>
  <rect x="58"  y="346" width="6" height="18" rx="1" fill="#E06B2D" opacity="0.8"/>
  <rect x="68"  y="355" width="6" height="9"  rx="1" fill="#2DA86B" opacity="0.8"/>
  <rect x="78"  y="350" width="6" height="14" rx="1" fill="#9B59B6" opacity="0.8"/>
  <rect x="88"  y="344" width="6" height="20" rx="1" fill="#E8A020" opacity="0.8"/>
  <rect x="98"  y="353" width="6" height="11" rx="1" fill="#2196F3" opacity="0.6"/>
  <rect x="108" y="349" width="6" height="15" rx="1" fill="#E06B2D" opacity="0.7"/>
  <rect x="118" y="347" width="6" height="17" rx="1" fill="#2DA86B" opacity="0.7"/>
  <line x1="38" y1="364" x2="130" y2="364" stroke="#1A3A5C" stroke-width="0.5"/>

  <!-- ===== FLOATING PARTICLES ===== -->
  <circle cx="340" cy="60"  r="1.5" fill="#5AC8FA" opacity="0.6"/>
  <circle cx="520" cy="50"  r="1"   fill="#5AC8FA" opacity="0.5"/>
  <circle cx="560" cy="130" r="1.5" fill="#2DA86B" opacity="0.5"/>
  <circle cx="310" cy="350" r="1.5" fill="#E06B2D" opacity="0.5"/>
  <circle cx="570" cy="360" r="1"   fill="#9B59B6" opacity="0.5"/>
  <circle cx="80"  cy="60"  r="1.5" fill="#5AC8FA" opacity="0.4"/>
  <circle cx="280" cy="80"  r="1"   fill="#2DA86B" opacity="0.4"/>

  <!-- ===== TITLE / BRANDING ===== -->
  <text x="300" y="42" font-size="18" font-weight="700" fill="white" font-family="monospace" text-anchor="middle" letter-spacing="2">scRNA · Analysis</text>
  <text x="300" y="60" font-size="9"  fill="#4A8FBE" font-family="monospace" text-anchor="middle" letter-spacing="3">SINGLE CELL TRANSCRIPTOMICS PLATFORM</text>
  <line x1="180" y1="68" x2="420" y2="68" stroke="#1A4A7A" stroke-width="0.6"/>
</svg>
